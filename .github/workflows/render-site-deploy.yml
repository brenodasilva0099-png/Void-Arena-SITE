name: Deploy SITE to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy hook secret
        run: |
          if [ -z "${{ secrets.RENDER_SITE_DEPLOY_HOOK }}" ]; then
            echo "Missing GitHub secret: RENDER_SITE_DEPLOY_HOOK"
            exit 1
          fi

      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_SITE_DEPLOY_HOOK }}"
