name: Deploy SITE to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Backup + Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.RENDER_SITE_DEPLOY_HOOK }}" ]; then
            echo "Missing GitHub secret: RENDER_SITE_DEPLOY_HOOK"
            exit 1
          fi
          if [ -z "${{ secrets.BOT_API_KEY }}" ]; then
            echo "Missing GitHub secret: BOT_API_KEY"
            exit 1
          fi

      - name: Backup database before SITE deploy
        env:
          BOT_API_URL: https://void-arena-bot.onrender.com
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
        run: node site/predeploy-backup.js

      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_SITE_DEPLOY_HOOK }}"
