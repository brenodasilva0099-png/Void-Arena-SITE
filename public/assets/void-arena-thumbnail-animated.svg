<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Void Arena animated thumbnail">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1b1550"/>
      <stop offset="48%" stop-color="#080b22"/>
      <stop offset="100%" stop-color="#02030b"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.20 0 0 0 0 0.85 0 0 0 0 1 0 0 0 .9 0" result="cyanGlow"/>
      <feMerge><feMergeNode in="cyanGlow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="logoClip"><circle cx="256" cy="256" r="112"/></clipPath>
    <style>
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{opacity:.45;transform:scale(.96)}50%{opacity:1;transform:scale(1.04)}}
      @keyframes drift{0%,100%{transform:translateY(-5px)}50%{transform:translateY(6px)}}
      .spin{transform-origin:256px 256px;animation:spin 7s linear infinite}.spin2{transform-origin:256px 256px;animation:spin 11s linear infinite reverse}.pulse{transform-origin:256px 256px;animation:pulse 2.4s ease-in-out infinite}.drift{animation:drift 3s ease-in-out infinite}
    </style>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle class="pulse" cx="256" cy="256" r="168" fill="none" stroke="#22d3ee" stroke-width="3" opacity=".35"/>
  <g class="spin" filter="url(#glow)">
    <circle cx="256" cy="256" r="190" fill="none" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round" stroke-dasharray="88 34 16 58" opacity=".88"/>
    <circle cx="256" cy="256" r="137" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" stroke-dasharray="30 80" opacity=".78"/>
  </g>
  <g class="spin2" opacity=".9">
    <path d="M256 58 L271 102 L256 94 L241 102 Z" fill="#67e8f9"/>
    <path d="M454 256 L410 271 L418 256 L410 241 Z" fill="#8b5cf6"/>
    <path d="M256 454 L241 410 L256 418 L271 410 Z" fill="#67e8f9"/>
    <path d="M58 256 L102 241 L94 256 L102 271 Z" fill="#8b5cf6"/>
  </g>
  <circle cx="256" cy="256" r="124" fill="#060817" stroke="rgba(103,232,249,.45)" stroke-width="3"/>
  <g clip-path="url(#logoClip)" class="drift">
    <image href="https://void-arena-site.onrender.com/assets/hollow-nexus.png" x="126" y="126" width="260" height="260" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <circle cx="256" cy="256" r="113" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="2"/>
  <text x="256" y="438" fill="#e9e4ff" font-family="Arial Black, Arial, sans-serif" font-size="32" text-anchor="middle" letter-spacing="3">VOID ARENA</text>
</svg>
