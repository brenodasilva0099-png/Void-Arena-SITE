<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-label="Void Arena animated banner">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070817"/>
      <stop offset="45%" stop-color="#121035"/>
      <stop offset="100%" stop-color="#061827"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#67e8f9" stop-opacity=".45"/>
      <stop offset="45%" stop-color="#8b5cf6" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.20 0 0 0 0 0.85 0 0 0 0 1 0 0 0 .95 0" result="cyanGlow"/>
      <feMerge><feMergeNode in="cyanGlow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="logoClip"><circle cx="928" cy="240" r="108"/></clipPath>
    <style>
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{opacity:.30;transform:scale(.96)}50%{opacity:.82;transform:scale(1.05)}}
      @keyframes sweep{0%{transform:translateX(-430px)}100%{transform:translateX(1280px)}}
      @keyframes flicker{0%,100%{opacity:.82}50%{opacity:1}}
      .spin{transform-origin:928px 240px;animation:spin 9s linear infinite}.spin2{transform-origin:928px 240px;animation:spin 15s linear infinite reverse}.pulse{transform-origin:928px 240px;animation:pulse 2.6s ease-in-out infinite}.sweep{animation:sweep 4.8s linear infinite}.flicker{animation:flicker 1.8s ease-in-out infinite}
    </style>
  </defs>
  <rect width="1200" height="480" rx="42" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#orb)" opacity=".7"/>
  <g opacity=".28">
    <path d="M0 84 C160 20 280 144 430 84 C620 10 740 160 920 90 C1050 38 1140 44 1200 70" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M0 380 C180 300 330 432 520 355 C695 284 790 400 980 340 C1080 308 1148 318 1200 286" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <g class="sweep" opacity=".33">
    <rect x="0" y="0" width="260" height="480" fill="rgba(103,232,249,.16)" transform="skewX(-18)"/>
  </g>
  <g transform="translate(78 96)">
    <text class="flicker" x="0" y="0" fill="#22d3ee" font-family="Arial Black, Arial, sans-serif" font-size="28" letter-spacing="7">VOID ARENA</text>
    <text x="0" y="86" fill="#f4f0ff" font-family="Arial Black, Arial, sans-serif" font-size="68">Placar Rematch</text>
    <text x="0" y="138" fill="#cfc7ff" font-family="Arial, sans-serif" font-size="28">ranking, patentes, filas 3x3/5x5 e partidas café com leite</text>
    <g transform="translate(0 190)">
      <rect width="178" height="52" rx="26" fill="rgba(34,211,238,.14)" stroke="rgba(34,211,238,.45)"/>
      <text x="89" y="35" fill="#e9e4ff" font-family="Arial Black, Arial, sans-serif" font-size="18" text-anchor="middle">3x3</text>
      <rect x="198" width="178" height="52" rx="26" fill="rgba(139,92,246,.17)" stroke="rgba(139,92,246,.55)"/>
      <text x="287" y="35" fill="#e9e4ff" font-family="Arial Black, Arial, sans-serif" font-size="18" text-anchor="middle">5x5</text>
      <rect x="396" width="224" height="52" rx="26" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.16)"/>
      <text x="508" y="35" fill="#e9e4ff" font-family="Arial Black, Arial, sans-serif" font-size="18" text-anchor="middle">PATENTES</text>
    </g>
  </g>
  <circle class="pulse" cx="928" cy="240" r="168" fill="none" stroke="#22d3ee" stroke-width="4"/>
  <g class="spin" filter="url(#glow)">
    <circle cx="928" cy="240" r="146" fill="none" stroke="#67e8f9" stroke-width="8" stroke-linecap="round" stroke-dasharray="84 38 18 64"/>
  </g>
  <g class="spin2">
    <circle cx="928" cy="240" r="122" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-dasharray="28 64" opacity=".88"/>
  </g>
  <circle cx="928" cy="240" r="116" fill="#050712" stroke="rgba(255,255,255,.16)" stroke-width="3"/>
  <g clip-path="url(#logoClip)">
    <image href="https://void-arena-site.onrender.com/assets/hollow-nexus.png" x="806" y="118" width="244" height="244" preserveAspectRatio="xMidYMid slice"/>
  </g>
</svg>
