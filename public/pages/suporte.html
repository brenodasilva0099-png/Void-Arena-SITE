<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Suporte • Void Arena</title>
  <link rel="icon" href="/favicon.png">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, Segoe UI, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 18% 12%, rgba(34,211,238,.18), transparent 32%),
        radial-gradient(circle at 82% 30%, rgba(139,92,246,.22), transparent 30%),
        #050713;
      padding: 30px 18px;
    }
    .wrap { width: min(1180px, 100%); margin: 0 auto; display: grid; gap: 18px; }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      border: 1px solid rgba(167,139,250,.22);
      border-radius: 28px;
      padding: 22px;
      background: linear-gradient(135deg, rgba(12,14,34,.92), rgba(21,26,61,.78));
      box-shadow: 0 24px 80px rgba(0,0,0,.32);
    }
    h1 { margin: 0; font-size: clamp(32px, 6vw, 58px); letter-spacing: -.06em; }
    h2 { margin: 0 0 12px; }
    p { color: #c9c4e8; line-height: 1.5; }
    a { color: inherit; }
    .btn {
      border: 1px solid rgba(167,139,250,.32);
      background: rgba(124,58,237,.18);
      color: #fff;
      border-radius: 14px;
      padding: 11px 14px;
      text-decoration: none;
      font-weight: 900;
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .btn.primary { background: linear-gradient(135deg, #8b5cf6, #22d3ee); border: 0; }
    .btn.danger { background: rgba(239,68,68,.16); border-color: rgba(248,113,113,.42); color: #fecaca; }
    .btn.success { background: rgba(34,197,94,.16); border-color: rgba(74,222,128,.38); color: #bbf7d0; }
    .panel, .card {
      border: 1px solid rgba(167,139,250,.22);
      border-radius: 24px;
      background: rgba(12,14,34,.88);
      box-shadow: 0 22px 70px rgba(0,0,0,.26);
      overflow: hidden;
    }
    .panel { padding: 18px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    label { display: grid; gap: 7px; color: #ddd6fe; font-weight: 900; font-size: 13px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid rgba(167,139,250,.22);
      border-radius: 14px;
      background: rgba(255,255,255,.055);
      color: #fff;
      padding: 12px;
      font: inherit;
      outline: none;
    }
    textarea { min-height: 140px; resize: vertical; }
    .full { grid-column: 1 / -1; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .list { display: grid; gap: 14px; }
    .card-head { padding: 16px; display: flex; justify-content: space-between; gap: 12px; background: rgba(255,255,255,.035); border-bottom: 1px solid rgba(167,139,250,.12); }
    .card-body { padding: 16px; display: grid; gap: 10px; }
    .pill { display: inline-flex; width: fit-content; padding: 6px 10px; border-radius: 999px; background: rgba(34,211,238,.12); border: 1px solid rgba(34,211,238,.25); color: #a5f3fc; font-weight: 950; font-size: 12px; }
    .muted { color: #a8a3c7; }
    .empty { border: 1px dashed rgba(167,139,250,.26); border-radius: 22px; padding: 20px; color: #c9c4e8; }
    .brand-strip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(34,211,238,.26);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(34,211,238,.08);
      color: #a5f3fc;
      font-weight: 950;
    }
    @media (max-width: 820px) { header { align-items: flex-start; flex-direction: column; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <span class="brand-strip">🛟 Central de Suporte Void Arena</span>
        <h1>Suporte</h1>
        <p>Abra um pedido quando encontrar problema no site, login, times, jogadores, formulários, eventos, placar, ranking ou chaveamento.</p>
      </div>
      <a class="btn" href="/pages/dashboard.html">Voltar</a>
    </header>

    <section class="panel">
      <h2>Abrir pedido</h2>
      <form id="supportForm" class="grid">
        <label>
          Resumo do problema
          <input name="title" maxlength="120" required placeholder="Ex: meus times não aparecem">
        </label>
        <label>
          Área afetada
          <select name="category" required>
            <option value="Site">Site</option>
            <option value="Login">Login</option>
            <option value="Jogadores">Jogadores</option>
            <option value="Times">Times</option>
            <option value="Formulários">Formulários</option>
            <option value="Eventos">Eventos</option>
            <option value="Chaveamento">Chaveamento</option>
            <option value="Fase de grupos">Fase de grupos</option>
            <option value="Placar / Ranking">Placar / Ranking</option>
            <option value="Discord / Bot">Discord / Bot</option>
          </select>
        </label>
        <label class="full">
          Página ou local
          <input name="page" maxlength="300" placeholder="Ex: /pages/times.html ou menu Jogadores">
        </label>
        <label class="full">
          Descrição
          <textarea name="description" maxlength="1800" required placeholder="Explique o que aconteceu, o que você tentou fazer e se apareceu algum erro."></textarea>
        </label>
        <div class="actions full">
          <button class="btn primary" type="submit">Enviar suporte</button>
          <span id="status" class="muted"></span>
        </div>
      </form>
    </section>

    <section id="staffPanel" class="panel" hidden>
      <h2>Pedidos recebidos</h2>
      <div id="ticketList" class="list"></div>
      <div id="ticketEmpty" class="empty" hidden>Nenhum pedido de suporte encontrado.</div>
    </section>
  </main>
  <script src="/js/suporte.js"></script>
</body>
</html>
