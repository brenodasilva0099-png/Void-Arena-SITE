<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Treinos • Void Arena</title>
  <link rel="icon" type="image/png" href="/favicon.png?v=3">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, .22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(34, 211, 238, .14), transparent 34%),
        #070711;
      color: #f8f7ff;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 38px 0; }
    .top { display: flex; gap: 16px; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    h1 { margin: 0; font-size: clamp(30px, 5vw, 52px); letter-spacing: -.05em; }
    p { color: #c9c4e8; margin: 8px 0 0; line-height: 1.6; }
    a { color: inherit; }
    .btn {
      border: 1px solid rgba(167,139,250,.35);
      background: rgba(124,58,237,.18);
      color: #f8f7ff;
      padding: 11px 14px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 800;
      cursor: pointer;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 16px; }
    .card {
      border: 1px solid rgba(167,139,250,.24);
      background: rgba(12, 13, 30, .76);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 22px 70px rgba(0,0,0,.28);
    }
    .card-body { padding: 18px; }
    video { width: 100%; max-height: 320px; background: #000; display: block; }
    .meta { display:flex; flex-wrap:wrap; gap:8px; margin: 12px 0; }
    .pill {
      font-size: 12px;
      padding: 7px 10px;
      border: 1px solid rgba(167,139,250,.28);
      background: rgba(124,58,237,.14);
      color: #ddd6fe;
      border-radius: 999px;
      font-weight: 800;
    }
    .status-pending { color: #fde68a; }
    .status-approved { color: #86efac; }
    .status-rejected { color: #fca5a5; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top: 14px; }
    .empty {
      border: 1px dashed rgba(167,139,250,.26);
      border-radius: 22px;
      padding: 28px;
      text-align: center;
      color: #c9c4e8;
      background: rgba(12, 13, 30, .48);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🎥 Treinos</h1>
        <p>Vídeos enviados pelo formulário do Discord aparecem aqui para análise.</p>
      </div>
      <a class="btn" href="/pages/dashboard.html">Voltar</a>
    </div>

    <div id="list" class="grid"></div>
    <div id="empty" class="empty" hidden>Nenhum treino enviado ainda.</div>
  </main>

  <script src="/js/treinos.js"></script>
</body>
</html>
