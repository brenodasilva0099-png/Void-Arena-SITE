<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Treinos • Void Arena</title>
  <link rel="icon" type="image/png" href="/favicon.png?v=3">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, .22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(34, 211, 238, .14), transparent 34%),
        #070711;
      color: #f8f7ff;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 38px 0; }
    .top { display: flex; gap: 16px; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    h1 { margin: 0; font-size: clamp(30px, 5vw, 52px); letter-spacing: -.05em; }
    p { color: #c9c4e8; margin: 8px 0 0; line-height: 1.6; }
    a { color: inherit; }
    .btn {
      border: 1px solid rgba(167,139,250,.35);
      background: rgba(124,58,237,.18);
      color: #f8f7ff;
      padding: 11px 14px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 800;
      cursor: pointer;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 16px; }
    .card {
      border: 1px solid rgba(167,139,250,.24);
      background: rgba(12, 13, 30, .76);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 22px 70px rgba(0,0,0,.28);
    }
    .card-body { padding: 18px; }
    video { width: 100%; max-height: 320px; background: #000; display: block; }
    .meta { display:flex; flex-wrap:wrap; gap:8px; margin: 12px 0; }
    .pill {
      font-size: 12px;
      padding: 7px 10px;
      border: 1px solid rgba(167,139,250,.28);
      background: rgba(124,58,237,.14);
      color: #ddd6fe;
      border-radius: 999px;
      font-weight: 800;
    }
    .status-pending { color: #fde68a; }
    .status-approved { color: #86efac; }
    .status-rejected { color: #fca5a5; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top: 14px; }
    .empty {
      border: 1px dashed rgba(167,139,250,.26);
      border-radius: 22px;
      padding: 28px;
      text-align: center;
      color: #c9c4e8;
      background: rgba(12, 13, 30, .48);
    }

    .video-preview {
      position: relative;
      width: 100%;
      min-height: 250px;
      border: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      overflow: hidden;
      background:
        radial-gradient(circle at 35% 28%, rgba(139,92,246,.42), transparent 28%),
        radial-gradient(circle at 72% 68%, rgba(34,211,238,.24), transparent 28%),
        linear-gradient(135deg, rgba(10,11,26,.98), rgba(19,10,38,.96));
      color: #fff;
      text-align: center;
    }

    .video-preview:disabled {
      cursor: not-allowed;
      opacity: .78;
    }

    .video-preview::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 22px;
      border: 1px solid rgba(167,139,250,.18);
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent),
        repeating-linear-gradient(135deg, rgba(255,255,255,.035) 0 1px, transparent 1px 13px);
      opacity: .82;
    }

    .video-preview-glow {
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 999px;
      background: rgba(124,58,237,.28);
      filter: blur(28px);
    }

    .video-preview-icon {
      position: relative;
      z-index: 1;
      width: 82px;
      height: 82px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 0 42px rgba(139,92,246,.38);
      font-size: 34px;
      font-weight: 900;
    }

    .video-preview-info {
      position: absolute;
      left: 22px;
      bottom: 18px;
      right: 22px;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(3,4,12,.56);
      border: 1px solid rgba(167,139,250,.16);
      backdrop-filter: blur(10px);
    }

    .video-preview-info strong,
    .video-preview-info small {
      display: block;
    }

    .video-preview-info small {
      color: #c9c4e8;
      font-weight: 700;
    }

    .player-name {
      display: block;
      margin-bottom: 6px;
    }

    .video-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(3,4,12,.76);
      backdrop-filter: blur(14px);
    }

    .video-modal.is-open {
      display: flex;
    }

    .video-modal-panel {
      width: min(1100px, 96vw);
      border-radius: 26px;
      border: 1px solid rgba(167,139,250,.28);
      background: rgba(8,9,22,.96);
      box-shadow: 0 28px 90px rgba(0,0,0,.54);
      overflow: hidden;
    }

    .video-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(167,139,250,.16);
    }

    .video-modal video {
      width: 100%;
      max-height: 72vh;
      background: #000;
      display: block;
    }

    .video-hint {
      padding: 0 18px 18px;
      margin: 12px 0 0;
    }


    .training-comments {
      margin: 12px 0 4px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(167,139,250,.14);
    }

    .training-comments strong {
      display: block;
      margin-bottom: 8px;
      color: #f6f0ff;
    }

    .training-comments p {
      margin: 6px 0;
      color: #d7d1f2;
    }

    .training-comments small {
      color: #a78bfa;
      font-weight: 800;
    }

  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <h1>🎥 Treinos</h1>
        <p>Vídeos enviados pelo formulário do Discord aparecem aqui para análise.</p>
      </div>
      <a class="btn" href="/pages/dashboard.html">Voltar</a>
    </div>

    <div id="list" class="grid"></div>
    <div id="empty" class="empty" hidden>Nenhum treino enviado ainda.</div>
  </main>

  <script src="/js/treinos.js"></script>
</body>
</html>
