<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Formulários • Void Arena</title>
  <link rel="icon" href="/favicon.png">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, Segoe UI, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 18% 12%, rgba(139,92,246,.22), transparent 34%),
        radial-gradient(circle at 85% 36%, rgba(34,211,238,.14), transparent 28%),
        #050713;
      padding: 34px 18px;
    }
    .wrap { width: min(1180px, 100%); margin: 0 auto; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 22px; }
    h1 { margin: 0; font-size: clamp(32px, 5vw, 54px); letter-spacing: -.06em; }
    p { color: #c9c4e8; line-height: 1.5; }
    .btn {
      border: 1px solid rgba(167,139,250,.32);
      background: rgba(124,58,237,.18);
      color: #fff;
      border-radius: 14px;
      padding: 11px 14px;
      text-decoration: none;
      font-weight: 900;
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .btn.primary { background: linear-gradient(135deg, #8b5cf6, #22d3ee); border: 0; }
    .btn.danger { background: rgba(239,68,68,.16); border-color: rgba(248,113,113,.42); color: #fecaca; }
    .btn[disabled] { opacity: .55; cursor: wait; }
    .list { display: grid; gap: 16px; }
    .card {
      border: 1px solid rgba(167,139,250,.22);
      border-radius: 24px;
      background: rgba(12,14,34,.88);
      overflow: hidden;
      box-shadow: 0 22px 70px rgba(0,0,0,.32);
    }
    .card-head {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid rgba(167,139,250,.12);
      background: rgba(255,255,255,.035);
    }
    .card-body { padding: 18px; display: grid; gap: 12px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }
    .field {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(167,139,250,.12);
    }
    .field strong { display: block; margin-bottom: 5px; color: #a5f3fc; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .full { grid-column: 1 / -1; }
    .pill {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(139,92,246,.18);
      border: 1px solid rgba(167,139,250,.24);
      color: #ddd6fe;
      font-weight: 900;
      font-size: 12px;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; padding: 0 18px 18px; }
    .comments {
      margin-top: 10px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(167,139,250,.12);
    }
    .empty {
      border: 1px dashed rgba(167,139,250,.26);
      border-radius: 22px;
      padding: 24px;
      color: #c9c4e8;
    }

    .compact-status {
      margin-top: 8px;
      font-size: 11px;
      padding: 6px 9px;
    }

    .application-avatar-wrap {
      position: relative;
      width: 92px;
      min-width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      border-radius: 26px;
      background:
        radial-gradient(circle at 30% 20%, rgba(139,92,246,.36), transparent 55%),
        rgba(139,92,246,.10);
      border: 1px solid rgba(167,139,250,.28);
      box-shadow: 0 0 32px rgba(139,92,246,.14);
    }

    .application-avatar {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,.18);
      background: rgba(3,4,12,.8);
      box-shadow: 0 0 24px rgba(34,211,238,.16);
    }

    .application-avatar-fallback {
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 950;
      color: #fff;
      background: linear-gradient(135deg, rgba(139,92,246,.92), rgba(34,211,238,.74));
    }

    .application-status {
      position: absolute;
      left: 50%;
      bottom: -10px;
      transform: translateX(-50%);
      white-space: nowrap;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 950;
      color: #ddd6fe;
      background: rgba(24,18,52,.96);
      border: 1px solid rgba(167,139,250,.35);
      box-shadow: 0 10px 20px rgba(0,0,0,.22);
    }

    @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } .application-avatar-wrap { width: 76px; min-width: 76px; height: 76px; } }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>📋 Formulários</h1>
        <p>Analise inscrições da Hollow Nexus, envie mensagens privadas aos jogadores e remova formulários inválidos sem eles voltarem do backup.</p>
      </div>
      <a class="btn" href="/pages/dashboard.html">Voltar</a>
    </header>
    <section id="list" class="list"></section>
    <div id="empty" class="empty" hidden>Nenhuma inscrição encontrada.</div>
  </main>
  <script src="/js/formularios.js"></script>
</body>
</html>
